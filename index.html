<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW — Image Editor</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="topbar">
            <div class="brand">R<span>W</span></div>
            <div class="top">
                <label for="image-input" class="btn">
                    <i class="ri-image-add-line"></i> Choose Image
                    <input type="file" name="" id="image-input" accept="image/*" hidden>
                </label>
                <button class="btn" id="reset-btn"><i class="ri-restart-line"></i> Reset</button>
                <button class="btn" id="download-btn"><i class="ri-download-2-line"></i> Download</button>
            </div>
        </div>

        <section>
            <div class="left">
                <div class="bottom">
                    <div class="placeholder">
                        <img src="asset/image.png" alt="">
                        <p>No image selected</p>
                    </div>
                    <canvas id="image-canvas"></canvas>
                </div>
            </div>

            <div class="right">
                <div class="panel-scroll">
                    <div class="panel-block">
                        <div class="panel-section-title">Adjustments</div>
                        <div class="filters"></div>
                    </div>
                    <div class="panel-block">
                        <div class="panel-section-title">Presets</div>
                        <div class="presets"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
